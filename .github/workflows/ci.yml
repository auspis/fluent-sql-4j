name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Java 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # Check code formatting
    - name: Check code formatting
      run: ./mvnw spotless:check

    # Run all tests: unit + H2 integration + E2E (as per README)
    - name: Run all tests (unit + H2 integration + E2E)
      run: ./mvnw verify jacoco:report

    # SonarCloud analysis for Pull Requests
    - name: SonarCloud Scan (PR)
      if: github.event_name == 'pull_request'
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_QUBE }}
      run: ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
        -Dsonar.projectKey=auspis_fluent-sql-4j \
        -Dsonar.organization=auspis \
        -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
        -Dsonar.pullrequest.branch=${{ github.head_ref }} \
        -Dsonar.pullrequest.base=${{ github.base_ref }}

    # SonarCloud analysis for branches (push)
    - name: SonarCloud Scan (Branch)
      if: github.event_name == 'push'
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_QUBE }}
      run: ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
        -Dsonar.projectKey=auspis_fluent-sql-4j \
        -Dsonar.organization=auspis \
        -Dsonar.branch.name=${{ github.ref_name }}

    # Upload Surefire and Failsafe reports for debugging
    - name: Upload Surefire reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: surefire-reports
        path: |
          **/target/surefire-reports/
    - name: Upload Failsafe reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: failsafe-reports
        path: |
          **/target/failsafe-reports/