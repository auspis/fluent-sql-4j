name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
      with:
        egress-policy: audit

    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Java 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: '21'
        distribution: 'corretto'

    - name: Cache Maven dependencies
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    # Check code formatting
    - name: Check code formatting
      run: ./mvnw spotless:check

    # Run all tests: unit + H2 integration + E2E (as per README)
    - name: Run all tests (unit + H2 integration + E2E)
      run: ./mvnw verify jacoco:report

    # Verify SPI discovery works on classpath (dual-mode support: JPMS + classpath)
    - name: Verify SPI discovery on classpath
      run: ./mvnw test -Pclasspath-strict -am -pl core -Dsurefire.failIfNoSpecifiedTests=false

    # SonarCloud analysis (requires SonarCloud Automatic Analysis disabled)
    - name: SonarCloud Scan
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_QUBE }}
      run: ./mvnw org.sonarsource.scanner.maven:sonar-maven-plugin:sonar

    # Upload Surefire and Failsafe reports for debugging
    - name: Upload Surefire reports
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: surefire-reports
        path: |
          **/target/surefire-reports/
    - name: Upload Failsafe reports
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: failsafe-reports
        path: |
          **/target/failsafe-reports/